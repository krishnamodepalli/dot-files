# ── Bootstrap TPM ──────────────────────────────────────────
# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# ── Plugins ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # Sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Persist sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'           # Better clipboard yank
set -g @plugin 'tmux-plugins/tmux-pain-control'   # Better pane bindings
set -g @plugin 'tmux-plugins/tmux-open'           # Open URLs/files with 'o'
set -g @plugin 'sainnhe/tmux-fzf'                 # Fuzzy find windows/sessions
set -g @plugin 'tmux-plugins/tmux-copycat'        # Regex search in copy mode
set -g @plugin 'fcsonline/tmux-thumbs'            # Hint-mode for fast copying
set -g @plugin 'christoomey/vim-tmux-navigator'   # Seamless vim<->tmux pane nav
set -g @plugin 'tmux-plugins/tmux-cpu'            # CPU stats for status bar
set -g @plugin 'tmux-plugins/tmux-battery'        # Battery for status bar

# ── Plugin Config ──────────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

set -g @thumbs-key 'f'
set -g @thumbs-unique 1
set -g @thumbs-position off_left

set -g @tmux-fzf-launch-key 'F'

# ── Terminal & Colors ──────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"            # True color
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # Undercurl
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Core Behavior ──────────────────────────────────────────
set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g buffer-limit 20
set -g display-time 2000
set -g display-panes-time 2000
set -g remain-on-exit off
set -g repeat-time 300
set -sg escape-time 0              # No delay for escape key (critical for vim)
set -g focus-events on             # Pass focus events through (helps vim)
set -g set-clipboard on
set -g detach-on-destroy off       # Go to next session on destroy
set -g renumber-windows on         # Renumber windows when one is closed
set -g base-index 1                # Start windows at 1
set -g pane-base-index 1           # Start panes at 1

# ── Prefix ─────────────────────────────────────────────────
unbind C-b
set -g prefix M-c
bind M-c send-prefix

# ── Reload Config ──────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message " ✓ Config reloaded"

# ── Session Management ─────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session
bind ( switch-client -p   # Previous session
bind ) switch-client -n   # Next session
bind L switch-client -l   # Last session

# ── Window Management ──────────────────────────────────────
bind c new-window -c "#{pane_current_path}"   # New window in same dir
bind , command-prompt -I "#W" "rename-window '%%'"
bind & confirm-before -p "Kill window #W? (y/n)" kill-window

# Navigate windows with Alt+( and Alt+)
bind -n M-( previous-window
bind -n M-) next-window

# Navigate sessions
bind -n C-M-j switch-client -p
bind -n C-M-l switch-client -n
bind -n C-M-k choose-session

# ── Splits ─────────────────────────────────────────────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"   # Full-height vertical
bind \\ split-window -fh -c "#{pane_current_path}"   # Full-width horizontal

# ── Pane Navigation (vim-tmux-navigator handles C-h/j/k/l) ─
# Fallback if not using vim-tmux-navigator:
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane Resizing ──────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r M-h resize-pane -L 15
bind -r M-j resize-pane -D 15
bind -r M-k resize-pane -U 15
bind -r M-l resize-pane -R 15
bind z resize-pane -Z              # Toggle zoom

# ── Pane Layouts ───────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled
bind s select-pane -m \; choose-window "join-pane -h -s '%%'"  # Move pane

# ── Copy Mode (vi) ─────────────────────────────────────────
bind Enter copy-mode                    # Enter copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "xclip -selection clipboard -i 2>/dev/null || xsel --clipboard --input 2>/dev/null || wl-copy 2>/dev/null || pbcopy"
bind -T copy-mode-vi Y   send -X copy-line                    # Copy full line
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi D   send -X copy-end-of-line
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i 2>/dev/null || pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Useful Extras ──────────────────────────────────────────
bind p paste-buffer                     # Paste
bind P choose-buffer                    # Choose from paste buffers
bind Tab last-window                    # Jump to last window
bind BSpace send-keys 'clear' Enter     # Clear pane
bind e new-window -n "~/.config/tmux/tmux.conf" "nvim ~/.config/tmux/tmux.conf"  # Edit config
bind / copy-mode \; send -X search-backward ""  # Search up in copy mode
bind ? list-keys                        # Show all keys

# Synchronize panes toggle
bind Y setw synchronize-panes \; display-message "Sync panes: #{?pane_synchronized,ON,OFF}"

# ── Pane Borders ───────────────────────────────────────────
set -g pane-border-style             "fg=#3b4261"
set -g pane-active-border-style      "fg=#7aa2f7"
set -g pane-border-lines             heavy
set -g pane-border-indicators        arrows

# ── Window Status ──────────────────────────────────────────
setw -g window-status-style          "fg=#565f89,bg=default"
setw -g window-status-current-style  "fg=#7aa2f7,bg=default,bold"
setw -g window-status-activity-style "fg=#e0af68,bg=default"
setw -g window-status-bell-style     "fg=#f7768e,bg=default,bold"

setw -g window-status-format         " #I#{?window_flags,#{window_flags}, } #W "
setw -g window-status-current-format " #[bold]#I#{?window_flags,#{window_flags}, } #W "

setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'

# ── Messages ───────────────────────────────────────────────
set -g message-style                 "fg=#c0caf5,bg=#1e2030,bold"
set -g message-command-style         "fg=#c0caf5,bg=#1e2030"

# ── Mode ───────────────────────────────────────────────────
set -g mode-style                    "fg=#1a1b26,bg=#7aa2f7"

# ══════════════════════════════════════════════════════════
#  STATUS BAR  ·  Tokyo Night palette
# ══════════════════════════════════════════════════════════

set -g status on
set -g status-position top           # Status bar at top (power move)
set -g status-interval 2
set -g status-justify left
set -g status-style                  "bg=#1a1b26"

# ── Left: Session ──────────────────────────────────────────
set -g status-left-length 60
set -g status-left "\
#[fg=#1a1b26,bg=#7aa2f7,bold]  #S \
#[fg=#7aa2f7,bg=#2d3149,nobold]\
#[fg=#565f89,bg=#2d3149] #{?client_prefix,#[fg=#f7768e]⌨ PREFIX ,}\
#[fg=#2d3149,bg=#1a1b26] "

# ── Right: System Info ─────────────────────────────────────
set -g status-right-length 120
set -g status-right "\
#[fg=#2d3149,bg=#1a1b26]\
#[fg=#565f89,bg=#2d3149] #{cpu_percentage}  \
#[fg=#3b4261,bg=#2d3149]│\
#[fg=#565f89,bg=#2d3149] #{battery_percentage} #{battery_icon} \
#[fg=#3b4261,bg=#2d3149]│\
#[fg=#565f89,bg=#2d3149] %H:%M \
#[fg=#3b4261,bg=#2d3149]│\
#[fg=#565f89,bg=#2d3149] %d %b \
#[fg=#7aa2f7,bg=#2d3149]\
#[fg=#1a1b26,bg=#7aa2f7,bold]  #h "

# ── CPU plugin options ──────────────────────────────────────
set -g @cpu_percentage_format "%3.0f%%"
set -g @cpu_low_fg_color    "#[fg=#9ece6a]"
set -g @cpu_medium_fg_color "#[fg=#e0af68]"
set -g @cpu_high_fg_color   "#[fg=#f7768e]"
set -g @cpu_low_icon    "▁"
set -g @cpu_medium_icon "▄"
set -g @cpu_high_icon   "█"

# ── Battery plugin options ──────────────────────────────────
set -g @batt_icon_charge_tier8 '█'
set -g @batt_icon_charge_tier7 '▇'
set -g @batt_icon_charge_tier6 '▆'
set -g @batt_icon_charge_tier5 '▅'
set -g @batt_icon_charge_tier4 '▄'
set -g @batt_icon_charge_tier3 '▃'
set -g @batt_icon_charge_tier2 '▂'
set -g @batt_icon_charge_tier1 '▁'
set -g @batt_icon_status_charged  '⚡'
set -g @batt_icon_status_charging '⚡'
set -g @batt_icon_status_discharging ' '
set -g @batt_color_low_fg '#[fg=#f7768e]'

# ══════════════════════════════════════════════════════════
#  INITIALIZE TPM  ·  KEEP THIS LAST
# ══════════════════════════════════════════════════════════
run '~/.tmux/plugins/tpm/tpm'

# ── Post-plugin overrides ───────────────────────────────────
# C-h (same byte as Ctrl+Backspace) — send backward-kill-word in shell,
# pass through to vim/nvim/fzf for their own navigation handling.
# Note: pane-left navigation from shell falls back to prefix+h.
bind -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" "send-keys C-h" "send-keys C-w"
